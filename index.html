<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>red light green light</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">
<h1>RED LIGHT, GREEN LIGHT</h1>
<p>hold <b>SPACE</b> to run. dont stop on red. people have died over this so be careful</p>

<div id="light">
  <div class="bulb red on"></div>
  <div class="bulb yellow"></div>
  <div class="bulb green"></div>
</div>

<div id="track">
  <div id="startFlash">GAME STARTED!</div>
  <div id="runner">
    <svg viewBox="0 0 16 24" width="16" height="24">
      <circle cx="8" cy="4" r="3" fill="black"/>
      <line x1="8" y1="7" x2="8" y2="15" stroke="black" stroke-width="2"/>
      <line x1="8" y1="10" x2="3" y2="14" stroke="black" stroke-width="2"/>
      <line x1="8" y1="10" x2="13" y2="14" stroke="black" stroke-width="2"/>
      <line x1="8" y1="15" x2="4" y2="23" stroke="black" stroke-width="2"/>
      <line x1="8" y1="15" x2="12" y2="23" stroke="black" stroke-width="2"/>
    </svg>
  </div>
  <div id="finish">FINISH</div>
</div>

<p id="stats">distance: 0% &nbsp; best: 0% &nbsp; attempts: 0</p>
<p id="status">hover start + press SPACE, or click</p>

<button id="startBtn">start</button>

<div id="message" hidden>
  <p id="messageText"></p>
  <p class="messageHint">press SPACE to continue</p>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
